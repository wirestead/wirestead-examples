name: CMake

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fetchcontent:
    name: FetchContent
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libboost-system-dev libboost-thread-dev

      - name: Configure
        run: cmake --preset fetchcontent

      - name: Build
        run: cmake --build --preset fetchcontent --parallel

  vcpkg:
    name: vcpkg
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Checkout vcpkg
        uses: actions/checkout@v7
        with:
          repository: microsoft/vcpkg
          path: vcpkg

      - name: Bootstrap vcpkg
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Configure
        run: cmake --preset vcpkg

      - name: Build
        run: cmake --build --preset vcpkg --parallel

  installed-package:
    name: Installed package
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      WIRESTEAD_INSTALL_PREFIX: /tmp/wirestead-prefix

    steps:
      - name: Checkout examples
        uses: actions/checkout@v7
        with:
          path: wirestead-examples

      - name: Checkout Wirestead
        uses: actions/checkout@v7
        with:
          repository: wirestead/wirestead
          ref: v0.9.0
          path: wirestead

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libboost-system-dev libboost-thread-dev libspdlog-dev

      - name: Configure Wirestead
        run: >
          cmake -S wirestead -B build-wirestead-install
          -DCMAKE_INSTALL_PREFIX=$WIRESTEAD_INSTALL_PREFIX
          -DWIRESTEAD_BUILD_TESTS=OFF
          -DWIRESTEAD_BUILD_DOCS=OFF

      - name: Build Wirestead
        run: cmake --build build-wirestead-install --parallel

      - name: Install Wirestead
        run: cmake --install build-wirestead-install

      - name: Configure examples
        working-directory: wirestead-examples
        run: cmake --preset installed

      - name: Build examples
        working-directory: wirestead-examples
        run: cmake --build --preset installed --parallel
