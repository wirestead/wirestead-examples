name: CMake

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fetchcontent:
    name: FetchContent
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libboost-system-dev libboost-thread-dev

      - name: Configure
        run: cmake --preset fetchcontent

      - name: Build
        run: cmake --build --preset fetchcontent --parallel

  vcpkg:
    name: vcpkg
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Checkout vcpkg
        uses: actions/checkout@v7
        with:
          repository: microsoft/vcpkg
          path: vcpkg

      - name: Bootstrap vcpkg
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Configure
        run: cmake --preset vcpkg

      - name: Build
        run: cmake --build --preset vcpkg --parallel

  installed-package:
    name: Installed package
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      UNILINK_INSTALL_PREFIX: /tmp/unilink-prefix

    steps:
      - name: Checkout examples
        uses: actions/checkout@v7
        with:
          path: unilink-examples

      - name: Checkout unilink
        uses: actions/checkout@v7
        with:
          repository: jwsung91/unilink
          ref: v0.7.3
          path: unilink

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libboost-system-dev libboost-thread-dev libspdlog-dev

      - name: Configure unilink
        run: >
          cmake -S unilink -B build-unilink-install
          -DCMAKE_INSTALL_PREFIX=$UNILINK_INSTALL_PREFIX
          -DUNILINK_BUILD_TESTS=OFF
          -DUNILINK_BUILD_DOCS=OFF

      - name: Build unilink
        run: cmake --build build-unilink-install --parallel

      - name: Install unilink
        run: cmake --install build-unilink-install

      - name: Configure examples
        working-directory: unilink-examples
        run: cmake --preset installed

      - name: Build examples
        working-directory: unilink-examples
        run: cmake --build --preset installed --parallel
